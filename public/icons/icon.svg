<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Warm cream background -->
  <rect width="512" height="512" fill="#fdf4f0"/>

  <!-- Soft glow behind flower -->
  <circle cx="256" cy="256" r="180" fill="#f5ddd8" opacity="0.55"/>

  <!-- 5 petals -->
  <g transform="translate(256,256)">
    <ellipse cx="0" cy="-94" rx="50" ry="84" fill="#f2aabf" transform="rotate(0)"/>
    <ellipse cx="0" cy="-94" rx="50" ry="84" fill="#f2aabf" transform="rotate(72)"/>
    <ellipse cx="0" cy="-94" rx="50" ry="84" fill="#f2aabf" transform="rotate(144)"/>
    <ellipse cx="0" cy="-94" rx="50" ry="84" fill="#f2aabf" transform="rotate(216)"/>
    <ellipse cx="0" cy="-94" rx="50" ry="84" fill="#f2aabf" transform="rotate(288)"/>

    <!-- Petal inner highlight -->
    <ellipse cx="0" cy="-98" rx="28" ry="54" fill="#fad4e2" opacity="0.65" transform="rotate(0)"/>
    <ellipse cx="0" cy="-98" rx="28" ry="54" fill="#fad4e2" opacity="0.65" transform="rotate(72)"/>
    <ellipse cx="0" cy="-98" rx="28" ry="54" fill="#fad4e2" opacity="0.65" transform="rotate(144)"/>
    <ellipse cx="0" cy="-98" rx="28" ry="54" fill="#fad4e2" opacity="0.65" transform="rotate(216)"/>
    <ellipse cx="0" cy="-98" rx="28" ry="54" fill="#fad4e2" opacity="0.65" transform="rotate(288)"/>
  </g>

  <!-- Center -->
  <circle cx="256" cy="256" r="58" fill="#fad060"/>
  <circle cx="256" cy="256" r="38" fill="#f0a030"/>
  <circle cx="256" cy="256" r="16" fill="#e07818" opacity="0.7"/>
</svg>
