name: Supabase Heartbeat

on:
  schedule:
    # Runs twice per week: Monday and Thursday at 08:00 UTC
    - cron: '0 8 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase reminders table
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/reminders?select=id&limit=1")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Heartbeat FAILED — Supabase returned HTTP $STATUS"
            exit 1
          fi
          echo "Heartbeat OK — Supabase is reachable and reminders table exists."
